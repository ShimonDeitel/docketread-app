name: Docket Read - Manga Log
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  DocketRead-MangaLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DocketRead-MangaLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mangalog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: DocketRead-MangaLog/Info.plist
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: DocketRead-MangaLog/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
  DocketRead-MangaLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DocketRead-MangaLogTests
    dependencies:
      - target: DocketRead-MangaLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  DocketRead-MangaLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DocketRead-MangaLogUITests
    dependencies:
      - target: DocketRead-MangaLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  DocketRead-MangaLog:
    build:
      targets:
        DocketRead-MangaLog: all
    test:
      targets:
        - DocketRead-MangaLogTests
        - DocketRead-MangaLogUITests
    run:
      config: Debug
